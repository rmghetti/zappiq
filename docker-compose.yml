version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:15-alpine
    container_name: zappiq-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zappiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zappiq_dev_2026}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zappiq-net

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: zappiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zappiq-net

  # ── Node.js API ──
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: zappiq-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: apps/api/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-zappiq_dev_2026}@postgres:5432/zappiq
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zappiq-net

  # ── Next.js Frontend ──
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: zappiq-web
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api
    networks:
      - zappiq-net

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: zappiq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - zappiq-net

volumes:
  postgres-data:
  redis-data:

networks:
  zappiq-net:
    driver: bridge
