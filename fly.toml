app = "zappiq-api"
primary_region = "gru"

[build]
dockerfile = "apps/api/Dockerfile"

# LGPD compliance: schema migrations run automatically before each deploy.
# Fly.io boots a release machine with the same image + secrets (DATABASE_URL),
# runs prisma db push, then only if successful promotes the new image.
#
# Flags:
#   --skip-generate      → client ja foi gerado no Docker build (economiza tempo)
#   --accept-data-loss   → nao-interativo; aceita mudancas flagradas como potencialmente
#                          destrutivas (ex: add coluna NOT NULL sem default). OK em ambiente
#                          controlado; para prod com dados reais, usar prisma migrate deploy.
#   timeout 10m          → npx baixando prisma (~30s) + db push pode exceder 5min default.
[deploy]
release_command = "npx --yes prisma@6.3.0 db push --schema=./node_modules/@zappiq/database/prisma/schema.prisma --skip-generate --accept-data-loss"
release_command_timeout = "10m"

[checks.health]
grace_period = "20s"
interval = "30s"
method = "GET"
path = "/health"
port = 3001
timeout = "5s"
type = "http"

[env]
ANTHROPIC_MODEL = "claude-sonnet-4-20250514"
APP_URL = "https://zappiq-api.fly.dev"
CORS_ORIGINS = "https://zappiq.vercel.app,https://zappiq.com.br,https://www.zappiq.com.br"
FRONTEND_URL = "https://zappiq.vercel.app"
JWT_EXPIRES_IN = "15m"
JWT_REFRESH_EXPIRES_IN = "7d"
NODE_ENV = "production"
PORT = "3001"
WHATSAPP_API_VERSION = "v21.0"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 3001
min_machines_running = 1

[http_service.concurrency]
hard_limit = 250
soft_limit = 200
type = "requests"

[[vm]]
memory = "512mb"
size = "shared-cpu-1x"
