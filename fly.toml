app = "zappiq-api"
primary_region = "gru"

[build]
dockerfile = "apps/api/Dockerfile"

[checks.health]
grace_period = "20s"
interval = "30s"
method = "GET"
path = "/health"
port = 3001
timeout = "5s"
type = "http"

[env]
ANTHROPIC_MODEL = "claude-sonnet-4-20250514"
APP_URL = "https://zappiq-api.fly.dev"
CORS_ORIGINS = "https://zappiq.vercel.app,https://zappiq.com.br,https://www.zappiq.com.br"
FRONTEND_URL = "https://zappiq.vercel.app"
JWT_EXPIRES_IN = "7d"
JWT_REFRESH_EXPIRES_IN = "30d"
NODE_ENV = "production"
PORT = "3001"
WHATSAPP_API_VERSION = "v21.0"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 3001
min_machines_running = 1

[http_service.concurrency]
hard_limit = 250
soft_limit = 200
type = "requests"

[[vm]]
memory = "512mb"
size = "shared-cpu-1x"
