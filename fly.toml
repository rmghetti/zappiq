app = "zappiq-api"
primary_region = "gru"

# Multi-region ready — atualmente single-region (gru) por decisão comercial.
# Ver docs/MULTI-REGION-READY.md para triggers de ativação e custos.
# Para adicionar região: fly machines clone <id> --region <gig|mia|iad|cdg>
# Regiões configuradas em standby (não ativas):
# [[regions]]  # Descomentar quando ativar DR geográfico
# name = "gig"
# capacity = 0  # standby, 0 machines

[build]
dockerfile = "apps/api/Dockerfile"

# LGPD compliance: schema migrations run automatically before each deploy.
# Fly.io boots a release machine com a mesma imagem + secrets (DATABASE_URL),
# roda prisma migrate deploy, e so promove a imagem se tiver sucesso.
#
# Prisma CLI e pre-instalado globalmente no Dockerfile runner stage.
#
# PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK=1: Supabase pooler (Supavisor) nao
# suporta pg_advisory_lock, entao desabilitamos. Seguro em release machine
# isolada (sem migrations concorrentes).
#
# IMPORTANTE: usamos `migrate deploy` em vez de `db push` para garantir
# reproducibilidade e auditoria de cada migration em produção. `db push`
# é útil em dev, mas em prod é anti-pattern — pode dropar colunas ou
# tabelas sem warning e não mantém histórico de migrations.
[deploy]
release_command = "sh -c 'set -e; SCHEMA=; if [ -z \"$SCHEMA\" ]; then echo \"ERROR: schema.prisma not found\"; exit 1; fi; echo \"Using schema: $SCHEMA\"; PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK=1 prisma migrate deploy --schema=\"$SCHEMA\"'"
release_command_timeout = "10m"

[checks.health]
grace_period = "20s"
interval = "30s"
method = "GET"
path = "/health"
port = 3001
timeout = "5s"
type = "http"

# /ready gates rolling deploys: Fly so marca machine "healthy" apos Postgres
# e Redis responderem. Evita cutover para machine que nao consegue servir.
[checks.ready]
grace_period = "45s"
interval = "15s"
method = "GET"
path = "/ready"
port = 3001
timeout = "8s"
type = "http"

[env]
ANTHROPIC_MODEL = "claude-sonnet-4-20250514"
APP_URL = "https://zappiq-api.fly.dev"
CORS_ORIGINS = "https://zappiq.vercel.app,https://zappiq.com.br,https://www.zappiq.com.br"
FRONTEND_URL = "https://zappiq.vercel.app"
JWT_EXPIRES_IN = "15m"
JWT_REFRESH_EXPIRES_IN = "7d"
NODE_ENV = "production"
PORT = "3001"
WHATSAPP_API_VERSION = "v21.0"

# min_machines_running=2 + auto_stop_machines=false garante rolling deploy
# sem downtime: Fly sobe nova machine, espera /ready passar, dreno SIGTERM
# na velha. Custo adicional: ~$2/mes por machine extra shared-cpu-1x 512mb.
[http_service]
auto_start_machines = true
auto_stop_machines = false
force_https = true
internal_port = 3001
min_machines_running = 2

[http_service.concurrency]
hard_limit = 250
soft_limit = 200
type = "requests"

[[vm]]
memory = "512mb"
size = "shared-cpu-1x"
